name: 每日定投偏离度

on:
  schedule:
    # 北京时间 18:00 = UTC 10:00，提前2小时触发以对冲GitHub延迟
    - cron: '0 10 * * 1-5'
    # 备用：UTC 11:00（北京19:00），双保险
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行定投偏离度脚本
        run: python combined_reminder.py
